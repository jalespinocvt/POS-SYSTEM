<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>POS Demo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h2>🍔 Food Ordering System</h2>
      <p>Prices are shown below. Add items to your order.</p>
    </header>

    <div id="menu" class="menu-card">
      <div class="menu-item">
        <span class="item-name">🍔 Burger</span>
        <span class="item-price">60 pesos</span>
      </div>
      <div class="menu-item">
        <span class="item-name">🍟 Fries</span>
        <span class="item-price">50 pesos</span>
      </div>
      <div class="menu-item">
        <span class="item-name">🐟 Fishball</span>
        <span class="item-price">20 pesos</span>
      </div>
      <div class="menu-item">
        <span class="item-name">🌭 Kikiam</span>
        <span class="item-price">25 pesos</span>
      </div>
    </div>

    <div id="order-section" class="order-section">
      <div class="input-group">
        <label for="choice">Choice:</label>
        <select id="choice">
          <option value="burger">🍔 Burger</option>
          <option value="fries">🍟 Fries</option>
          <option value="fishball">🐟 Fishball</option>
          <option value="kikiam">🌭 Kikiam</option>
        </select>
      </div>

      <div class="input-group">
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="1" value="1">
      </div>

      <button id="addItem" class="btn-primary">Add Item ➕</button>
    </div>

    <div class="order-summary">
      <h3>📋 Order Summary</h3>
      <ul id="orderList"></ul>
      <div class="total-row">
        <span>Total:</span>
        <span id="total" class="total-amount">0</span> pesos
      </div>
    </div>

    <div id="payment" class="payment-section">
      <div class="input-group">
        <label for="cash">💰 Cash:</label>
        <input type="number" id="cash" placeholder="Enter cash amount">
      </div>
      <button id="payBtn" class="btn-success">Pay Now! 💳</button>
      <p id="change" class="change-display"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
